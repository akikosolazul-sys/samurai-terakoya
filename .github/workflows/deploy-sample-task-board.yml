name: Deploy sample_task_board to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'ClaudeCode/sample_task_board/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: ClaudeCode/sample_task_board
        run: npm ci

      - name: Build
        working-directory: ClaudeCode/sample_task_board
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ClaudeCode/sample_task_board/dist
          destination_dir: sample_task_board
          keep_files: true
